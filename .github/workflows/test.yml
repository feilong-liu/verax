name: Linux Build

on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '!*.md'
      - '!docs/**'
      - '!.github/workflows/*.md'
  pull_request:
    paths:
      - '**'
      - '!*.md'
      - '!docs/**'
      - '!.github/workflows/*.md'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  ubuntu-build:
    name: Ubuntu Build
    runs-on: ubuntu-latest-16-cores
    container:
      image: ghcr.io/facebookincubator/velox-dev:adapters
    env:
      CCACHE_DIR: ${{ github.workspace }}/ccache
      VELOX_DEPENDENCY_SOURCE: BUNDLED
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Fix git permissions
        run: git config --global --add safe.directory ${GITHUB_WORKSPACE}

      - name: Setup ccache
        uses: actions/cache@v3
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-ubuntu-${{ github.sha }}
          restore-keys: |
            ccache-ubuntu-

      - name: Verify Environment
        run: |
          echo "Using pre-built Docker image with dependencies"
          ccache --version
          cmake --version
          g++ --version

      - name: Clear CCache Statistics
        run: |
          ccache -sz

      # - name: Build Debug
      #   env:
      #     MAKEFLAGS: NUM_THREADS=2 MAX_HIGH_MEM_JOBS=1 MAX_LINK_JOBS=1
      #     EXTRA_CMAKE_FLAGS: >-
      #       -DVELOX_ENABLE_PARQUET=ON
      #       -DBoost_NO_BOOST_CMAKE=ON
      #       -DVELOX_ENABLE_HIVE=ON
      #       -DVELOX_BUILD_TESTING=ON
      #       -DVELOX_ENABLE_EXAMPLES=OFF
      #       -DVELOX_ENABLE_BENCHMARKS=ON
      #       -DVELOX_BUILD_EXCHANGE_BENCHMARK=OFF
      #       -DVELOX_BUILD_EXCHANGE_BENCHMARK=OFF
      #       -DVELOX_ENABLE_ARROW=OFF
      #       -DVELOX_ENABLE_HDFS=OFF
      #       -DVELOX_ENABLE_S3=OFF
      #       -DVELOX_ENABLE_GCS=OFF
      #       -DVELOX_ENABLE_ABFS=OFF
      #       -DVELOX_ENABLE_REMOTE_FUNCTIONS=OFF
      #       -DVELOX_ENABLE_CUDF=OFF
      #       -DVELOX_ENABLE_WAVE=OFF
      #       -DVELOX_ENABLE_GEO=ON
      #       -DVELOX_ENABLE_FAISS=OFF
      #       -DVELOX_ENABLE_DWIO=ON
      #     USE_NINJA: 1
      #   run: |
      #     # Build with debugging symbols using minimal components
      #     make debug
      #     # Then run tests
      #     cd _build/debug && ctest -j 4 --output-on-failure --no-tests=error
      #     cd ../..

      - name: Build Release
        env:
          MAKEFLAGS: NUM_THREADS=2 MAX_HIGH_MEM_JOBS=1 MAX_LINK_JOBS=1
          EXTRA_CMAKE_FLAGS: >-
            -DVELOX_ENABLE_PARQUET=ON
            -DBoost_NO_BOOST_CMAKE=ON
            -DVELOX_ENABLE_HIVE=ON
            -DVELOX_BUILD_TESTING=ON
            -DVELOX_ENABLE_EXAMPLES=OFF
            -DVELOX_ENABLE_BENCHMARKS=ON
            -DVELOX_BUILD_EXCHANGE_BENCHMARK=OFF
            -DVELOX_BUILD_EXCHANGE_BENCHMARK=OFF
            -DVELOX_ENABLE_ARROW=OFF
            -DVELOX_ENABLE_HDFS=OFF
            -DVELOX_ENABLE_S3=OFF
            -DVELOX_ENABLE_GCS=OFF
            -DVELOX_ENABLE_ABFS=OFF
            -DVELOX_ENABLE_REMOTE_FUNCTIONS=OFF
            -DVELOX_ENABLE_CUDF=OFF
            -DVELOX_ENABLE_WAVE=OFF
            -DVELOX_ENABLE_GEO=ON
            -DVELOX_ENABLE_FAISS=OFF
            -DVELOX_ENABLE_DWIO=ON
          USE_NINJA: 1
        run: |
          make release

      - name: Run Release Tests
        working-directory: _build/release
        run: |
          ctest -j$(nproc) --output-on-failure --no-tests=error

      - name: CCache Statistics
        run: |
          ccache -s
